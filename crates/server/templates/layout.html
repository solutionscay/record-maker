<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>record-maker</title>
  {# TODO(#13b): vendor htmx locally for offline desktop use; CDN is fine for the dev scaffold #}
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 48rem; margin: 3rem auto; padding: 0 1rem; color: #1b1b1f; }
    h1 { margin-bottom: .25rem; }
    nav { display: flex; gap: .5rem; margin: 1rem 0; }
    nav a { padding: .25rem .6rem; border: 1px solid #ccc; border-radius: .4rem; text-decoration: none; color: #1b1b1f; }
    table { border-collapse: collapse; width: 100%; margin: 1rem 0; }
    th, td { border: 1px solid #ddd; padding: .4rem .6rem; text-align: left; }
    th { background: #f5f5f7; }
    form.inline { margin: 0; }
    form.newrec { display: flex; flex-wrap: wrap; gap: .75rem; align-items: end; margin-top: .5rem; }
    label { display: flex; flex-direction: column; font-size: .85rem; gap: .2rem; }
    input { font: inherit; padding: .35rem .5rem; border: 1px solid #888; border-radius: .3rem; }
    button { font: inherit; padding: .4rem .8rem; border-radius: .4rem; border: 1px solid #888; cursor: pointer; background: #fff; }
  </style>
</head>
<body>
  {% block content %}{% endblock %}
</body>
</html>
